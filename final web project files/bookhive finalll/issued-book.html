<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Issued Books — BookHive</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
   <link rel="stylesheet" href="theme.css">
  <style>
    :root{
      --teal:#00a497; 
      --orange:#ff7a00; 
      --dark-slate:#2F4F4F; 
      --card-bg:#ffffff;
    }

    
    
     

    .form-wrapper{
      width: 950px; 
      max-width: 96%;
      background: linear-gradient(180deg, rgba(255,255,255,0.96), rgba(255,255,255,0.92));
      box-shadow: 0 15px 40px rgba(0,0,0,0.25);
      border-radius: 12px;
      overflow: hidden;
      animation: float 6s ease-in-out infinite alternate;
    }

    @keyframes float {
      from { transform: translateY(0px); }
      to { transform: translateY(-10px); }
    }

    .left-panel{
      background: linear-gradient(135deg, rgba(0,164,151,0.95), rgba(255,122,0,0.95));
      color:#fff; 
      min-height: 500px;
    }

    .brand-title{ font-weight:700; letter-spacing:0.2px; }

    .right-panel{ 
      background: var(--card-bg); 
      min-height: 500px; 
      overflow-y: auto;
      padding-bottom: 25px;
    }

    .form-control, .form-select{
      border-radius:10px; 
      border:1px solid #e6e8eb; 
      box-shadow:none; 
    }

    .btn-issue{
      background: linear-gradient(90deg,var(--teal),var(--orange));
      border:none; 
      color:#fff; 
      border-radius:10px; 
      padding:12px 18px; 
      font-weight:600; 
      transition:0.3s;
    }

    .btn-issue:hover{
      transform: translateY(-3px);
      box-shadow: 0 8px 18px rgba(0,0,0,0.2);
    }

    table thead {
      background: linear-gradient(90deg,var(--teal),var(--orange));
      color: #fff;
    }

    .table-container {
      max-height: 200px;
      overflow-y: auto;
    }

  </style>
</head>
<body>

  <main class="d-flex align-items-center justify-content-center min-vh-100">
    <section class="form-wrapper shadow-lg rounded-4 overflow-hidden">
      <div class="row g-0">

        <!-- Left Side -->
        <div class="col-md-5 left-panel d-flex flex-column justify-content-center align-items-center text-center p-4">
          <img src="assets/logo.png" alt="Library Logo" width="120" height="120" class="mb-3">
          <h2 class="brand-title mt-3">Issued Books</h2>
          <p class="text-light small px-3">Keep track of all issued books efficiently with BookHive’s system.</p>
        </div>

        <!-- Right Panel -->
        <div class="col-md-7 right-panel p-4">
          <div class="p-2">
            <h3 class="mb-1 text-dark-slate">Book Issue Form</h3>
            <p class="text-muted mb-4">Record details of books issued to members</p>

            <form id="issueForm" novalidate>
              <div class="row g-3">
               
                <div class="col-md-6">
                  <label class="form-label">Member ID</label>
                  <input type="text" class="form-control" required>
                </div>

                <div class="col-md-6">
                  <label class="form-label">Member Name</label>
                  <input type="text" class="form-control" required>
                </div>

                <div class="col-md-6">
                  <label class="form-label">Book ID</label>
                  <input type="text" class="form-control" required>
                </div>

                <div class="col-md-6">
                  <label class="form-label">Book Title</label>
                  <input type="text" class="form-control" required>
                </div>

                <div class="col-md-6">
                  <label class="form-label">Issue Date</label>
                  <input type="date" class="form-control" required>
                </div>

                <div class="col-md-6">
                  <label class="form-label">Return Date</label>
                  <input type="date" class="form-control" required>
                </div>

                <div class="col-12">
                  <label class="form-label">Remarks</label>
                  <textarea class="form-control" rows="2"></textarea>
                </div>
              </div>

              <div class="d-grid mt-4">
                <button type="submit" class="btn btn-lg btn-issue">Issue Book</button>
              </div>
            </form>

            <!-- Issued Books Table -->
            <div class="mt-5">
              <h5 class="mb-3">Recently Issued Books</h5>
              <div class="table-container">
                <table class="table table-bordered table-striped align-middle">
                  <thead>
                    <tr>
                      <th>Member ID</th>
                      <th>Book ID</th>
                      <th>Book Title</th>
                      <th>Issue Date</th>
                      <th>Return Date</th>
                    </tr>
                  </thead>
                  <tbody id="issuedBooksTable">
                    <!-- Data appears here -->
                  </tbody>
                </table>
              </div>
            </div>

          </div>
        </div>

      </div>
    </section>
  </main>

  <script>
    document.getElementById("issueForm").addEventListener("submit", function(e){
      e.preventDefault();
      const form = e.target;
      const memberId = form.querySelectorAll("input")[0].value;
      const memberName = form.querySelectorAll("input")[1].value;
      const bookId = form.querySelectorAll("input")[2].value;
      const bookTitle = form.querySelectorAll("input")[3].value;
      const issueDate = form.querySelectorAll("input")[4].value;
      const returnDate = form.querySelectorAll("input")[5].value;

      const table = document.getElementById("issuedBooksTable");
      const newRow = `<tr>
        <td>${memberId}</td>
        <td>${bookId}</td>
        <td>${bookTitle}</td>
        <td>${issueDate}</td>
        <td>${returnDate}</td>
      </tr>`;
      table.insertAdjacentHTML("beforeend", newRow);

      alert(`✅ Book "${bookTitle}" has been issued to ${memberName}.`);
      form.reset();
    });
  </script>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const savedTheme = localStorage.getItem("theme");
      if (savedTheme === "dark") {
        document.body.classList.add("dark-mode");
      }
    });
  </script>

</body>
</html>
