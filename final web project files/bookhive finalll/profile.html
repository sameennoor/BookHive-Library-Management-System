<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile Settings — Library Management</title>
  <link rel="icon" type="image/png" href="assets/logo.png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    body {
      background: url('assets/tag1.jpg') no-repeat center center/cover;
      font-family: 'Quicksand', sans-serif;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
      overflow: hidden;
      transition: background-color 0.4s ease, color 0.4s ease;
    }

    body::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(0,128,128,0.7), rgba(255,165,0,0.6));
      z-index: 0;
    }

    .profile-container {
      position: relative;
      z-index: 1;
      background: #ffffff;
      border-radius: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.25);
      padding: 40px 50px;
      width: 600px;
      text-align: center;
      transition: background-color 0.3s ease, color 0.3s ease;
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      color: teal;
      margin-bottom: 20px;
      transition: color 0.3s ease;
    }

    .form-label {
      font-weight: 600;
      color: #333;
      text-align: left;
      display: block;
      margin-top: 10px;
    }

    .form-control {
      border-radius: 10px;
      border: 1px solid #ccc;
      padding: 10px;
      transition: all 0.3s ease;
    }

    .form-control:focus {
      border-color: teal;
      box-shadow: 0 0 8px rgba(0,128,128,0.4);
    }

    .save-btn {
      margin-top: 25px;
      background: linear-gradient(135deg, #00b3b3, #ffa500);
      border: none;
      color: white;
      font-weight: 600;
      padding: 12px 30px;
      border-radius: 12px;
      transition: all 0.3s ease;
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }

    .save-btn:hover {
      background: linear-gradient(135deg, #008080, #ff8c00);
      transform: translateY(-3px);
    }

    .back-btn {
      display: block;
      margin-top: 15px;
      color: teal;
      text-decoration: none;
      font-weight: 600;
      transition: color 0.3s;
    }

    .back-btn:hover {
      color: #ff8c00;
    }

    /* 🌙 Dark Mode */
    body.dark-mode {
      background: #121212;
      color: #f1f1f1;
    }

    body.dark-mode::before {
      background: linear-gradient(135deg, rgba(0,0,0,0.8), rgba(40,40,40,0.7));
    }

    body.dark-mode .profile-container {
      background: #1e1e1e;
      box-shadow: 0 10px 25px rgba(255,255,255,0.1);
    }

    body.dark-mode .form-label {
      color: #ccc;
    }

    body.dark-mode .form-control {
      background: #2a2a2a;
      color: #f1f1f1;
      border: 1px solid #444;
    }

    body.dark-mode h1 {
      color: #ffa500;
    }
  </style>
</head>
<body>
  <div class="profile-container">
    <h1>👤 Profile Settings</h1>
    <form>
      <div class="mb-3">
        <label class="form-label">Full Name</label>
        <input type="text" class="form-control" placeholder="Enter your full name">
      </div>
      <div class="mb-3">
        <label class="form-label">Email Address</label>
        <input type="email" class="form-control" placeholder="Enter your email">
      </div>
      <div class="mb-3">
        <label class="form-label">Phone Number</label>
        <input type="text" class="form-control" placeholder="Enter your phone number">
      </div>
      <div class="mb-3">
        <label class="form-label">Role</label>
        <select class="form-control">
          <option>Admin</option>
          <option>Librarian</option>
          <option>Intern</option>
          <option>Member</option>
        </select>
      </div>

      <button type="submit" class="save-btn">💾 Save Changes</button>
      <a href="setting.html" class="back-btn">⬅ Back to Settings</a>
    </form>
  </div>

  <script>
    // Apply saved theme
    document.addEventListener("DOMContentLoaded", () => {
      const savedTheme = localStorage.getItem("theme");
      if (savedTheme === "dark") document.body.classList.add("dark-mode");
    });
  </script>
</body>
</html>
